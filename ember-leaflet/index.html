<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ember Starter Kit</title>
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css">
  
  <link rel="stylesheet" href="css/leaflet.css">
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css" rel="stylesheet">
  <link href='css/L.Control.Locate.css' rel='stylesheet' />
  <link href='css/leaflet.draw.css' rel='stylesheet' />
  
  <!--[if lt IE 9]>
      <link href='https://api.tiles.mapbox.com/mapbox.js/plugins/leaflet-locatecontrol/v0.21.0/L.Control.Locate.ie.css' rel='stylesheet' />
  <![endif]-->
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script type="text/x-handlebars">
    <div class="content">
      <h2 class="app-title">Ember.js + Leaflet</h2>
    </div>
      {{outlet}}
  </script>

  <script type="text/x-handlebars" id="index">
    <div class="content card">
      <ul>
      {{#each item in model}}
        <li>
        {{#link-to item}}
          {{item}}
        {{/link-to}}
        </li>
      {{/each}}
      </ul>
    </div>
    {{outlet}}
  </script>
  
  <script type="text/x-handlebars" id="leaflet">
    <div class="content card">
        <h1>{{model}}</h1>
        {{input type="number" value="zoomLevel" min="0" max="18" valueBinding="zoomLevel"}}
    </div>
  </script>
  
  <script type="text/x-handlebars" id="map1">
    <div class="content card">
        <h1>{{model}}</h1>
        {{input type="number" value="zoomLevel" min="0" max="18" valueBinding="zoomLevel"}}
    </div>
  </script>
  

  <script src="js/libs/jquery-1.10.2.js"></script>
  <script src="js/libs/handlebars-1.1.2.js"></script>
  <script src="js/libs/ember-1.7.0.js"></script>
  
  <script type="text/javascript" src="http://maps.stamen.com/js/tile.stamen.js?v1.3.0"></script>
  
  <script src="js/libs/leaflet.js"></script>
  <script src="js/libs/leaflet.markercluster.js"></script>
  <script src='js/libs/leaflet.Control.Locate.min.js'></script>
  
  <script src="js/libs/ember-leaflet.js"></script>
  <script src="js/app.js"></script>
  <!-- to activate the test runner, add the "?test" query string parameter -->
  <script src="tests/runner.js"></script>
</body>
</html>
